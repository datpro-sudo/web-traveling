<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velora — Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <a class="brand" href="/">Velora</a>
        <h1>Create account</h1>
        <p class="subtitle">Join Velora and start planning your next premium journey.</p>
        <form method="post" action="/register">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Choose a username" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Create a password" required />

          <button type="submit">Create account</button>
        </form>
        <p class="hint">Already have an account? <a href="/login">Sign in</a></p>
      </div>
    </div>
  </body>
</html>
